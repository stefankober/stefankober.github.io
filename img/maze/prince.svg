<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-label="treasure chest">
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- lid -->
    <path d="M8 14
             C8 10, 24 10, 24 14"
          fill="#9a6a3a"
          stroke="#5a4632"
          stroke-width="1.6"/>

    <!-- base -->
    <rect x="8" y="14" width="16" height="8"
          fill="#b07a45"
          stroke="#5a4632"
          stroke-width="1.6"/>

    <!-- lock (bigger!) -->
    <rect x="14.5" y="16.5" width="3" height="3"
          fill="#d8b24a"
          stroke="#5a4632"
          stroke-width="1"/>

  </g>
</svg>