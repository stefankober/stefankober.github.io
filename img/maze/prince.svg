<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-label="treasure chest">
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- lid -->
    <path d="M10 14 C10 11, 22 11, 22 14"
          fill="#9a6a3a"
          stroke="#5a4632"
          stroke-width="1.4"/>

    <!-- base -->
    <rect x="10" y="14" width="12" height="8"
          fill="#b07a45"
          stroke="#5a4632"
          stroke-width="1.4"/>

    <!-- lock -->
    <rect x="15" y="17" width="2" height="2"
          fill="#d8b24a"
          stroke="#5a4632"
          stroke-width="0.8"/>

  </g>
</svg>