    <section><h2 id="follow-your-curiosity">Follow Your Curiosity</h2>
<section id="homepage-quote" class="homepage-quote"></section>
<script>
const quotes = [
  {
    text: "Conviction formation theory opens a possibility: agreement at the level of mechanisms, even when agreement on facts or values breaks down.<br>It requires little commitment beyond what can be observed in experience. It asks us to attend to how conviction appears and stabilizes, so that patterns become visible.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "Differences in conviction often begin in differences of attention. Not in disagreement, but in what is seen at all. Magicians and pickpockets rely on this. They direct attention away from the action.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "In questions of meaning, experience can appear full or empty without prior reasoning. Something feels worth pursuing, or it does not. The sense of meaning is often immediate. There is no premise or conclusion here.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "Immediate conviction varies between people. What convinces one person leaves another unmoved. One sees injustice, another does not. One is struck by beauty, another passes by. One feels meaning, another feels nothing.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "The formation of conviction is not one-directional. It moves back and forth. I react, you respond, I adjust. Something emerges between us, or fails to. What convinces can shift through this exchange, sometimes subtly, sometimes abruptly.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "Convictions do not stand alone. They connect in the form of stories.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "We may not agree on what is true or right, but we may recognize how conviction forms. <br>Conviction formation theory begins from what convinces. Not in general, but in each case. What convinces me, what convinces you. From there, comparison becomes possible.",
    source: "Aspects Of Conviction Formation In Ethics, Aesthetics, And Meaning",
    url: "/essays/ethics-aesthetics-meaning/"
  },
  {
    text: "When we count a pile of stones, we expect that anyone else who performs the same activity carefully will obtain the same number. If a discrepancy arises, we do not usually conclude that the amount has changed mysteriously, or that the amount is different for different persons. Instead, we recount and look for an error in the procedure.",
    source: "How Formal Systems Reorganize Belief",
    url: "/essays/formal-systems/"
  },
  {
    text: "Socrates draws a square in the sand and asks the boy how to construct a square with twice the area. <br><img src='/meno1.svg' width='66' height='66'><br>The boy first proposes a solution that seems plausible but turns out to be incorrect, namely to double the length of the sides. <br><img src='/meno2.svg' width='120' height='120'><br>But that quadruples the area, as we have now four squares of the same size.",
    source: "How Formal Systems Reorganize Belief",
    url: "/essays/formal-systems/"
  },
  {
    text: "Scenes like the following are familiar from crime novels or detective films.<br>Suspect: 'I did not do it. But I feel sorry for the poor man. No one deserves to be stabbed with a knife to death like that.'<br>Inspector: 'But we never said the victim was stabbed with a knife.'<br>The suspect is then arrested.<br>What gives this scene its convincing force and relief?<br>One possible answer would be logic. Another might be probability, which we will get to in the next chapter. But many people immediately find the conclusion persuasive without consciously applying logic or probability. ",
    source: "How Formal Systems Reorganize Belief",
    url: "/essays/formal-systems/"
  },
  {
    text: "Conviction formation theory holds that conviction comes naturally to us: 'There is a house', 'I am hungry', 'Stones, when thrown into the air, fall back to the ground'. Like breathing, conviction formation operates autonomously in the background, but can also be taken up deliberately. Formal systems such as logic, probability, and statistics refine and constrain the latter process from within, shaping explicit conviction formation rules. They can also influence the more automatic processes over time.",
    source: "How Formal Systems Reorganize Belief",
    url: "/essays/formal-systems/"
  },
  {
    text: "The gist of conviction formation theory is simple: you can’t choose what you believe, in the same way you can’t choose what makes you angry or sad. Belief settles where things feel compelling, although they are influenced by reflection, different viewpoints and updated information, in the same way as emotions are. That is what gives opinion its provisional stability.",
    source: "Questions And Stories",
    url: "/essays/questions-and-stories/"
  },
  {
    text: "As with opinions, questions and doubts are not chosen at will. You cannot decide to be genuinely puzzled or uncertain. What you can do is encounter new considerations, notice gaps, or be confronted with situations that give rise to questions you did not have before. You can even train yourself to raise questions in specific situations, if you have the opinion that this is a good course of action.",
    source: "Questions And Stories",
    url: "/essays/questions-and-stories/"
  },
  {
    text: "Some methods repeatedly lead to convictions that survive criticism better than others, like logic or probability theory.<br>These observations are not illusions. Situations exist where we regret not using criteria.",
    source: "On Criteria For Good Convictions",
    url: "/essays/on-criteria/"
  },
  {
    text: "Here is the surprising part: in many situations where we reach for truth-talk, what we actually need is clarity about conviction formation. Invoking truth does not always help. Sometimes it obscures what is really going on.",
    source: "On Conviction Formation Part I - Foundations",
    url: "/essays/on-conviction-formation-i/"
  },
  {
    text: "You have a question.<br>You are puzzled. The answer matters. You have a stake in it.<br>Then something changes.<br>The question no longer matters.",
    source: "On Persistence Of Questions And Convictions",
    url: "/essays/on-persistence-of-questions-and-convictions/"
  },
  {
    text: "Questions such as:<br>'What is knowledge?'<br>'What is justice?'<br>'What is consciousness?'<br>have accompanied some individuals for decades and entire traditions for centuries.<br>The persistence of such questions cannot be explained merely by a lack of answers.",
    source: "On Persistence Of Questions And Convictions",
    url: "/essays/on-persistence-of-questions-and-convictions/"
  },
  {
    text: "A person may remain convinced for decades that close friendships are important.<br>This conviction may survive changing jobs, changing cities, changing political views, and changing personal circumstances.<br>Many other convictions come and go.<br>This one remains.<br>Why?",
    source: "On Persistence Of Questions And Convictions",
    url: "/essays/on-persistence-of-questions-and-convictions/"
  },
  {
    text: "How does the conviction arise that two possibilities exclude one another?<br>How does the conviction arise that there are no further possibilities?",
    source: "Mutually Exclusive, Collectively Exhaustive",
    url: "/essays/mutually-exclusive-collectively-exhaustive/"
  },
  {
    text: "First, observe your breath.<br>It is just going its way, naturally.<br>Or did simply observing it already change things? Did you automatically take a little control? It happens for some people.<br>But mostly you should be observing a process that runs automatically.<br>Now hold your breath. Only briefly. Only for as long as you are comfortable.<br>This seems like a clear example of voluntary action.",
    source: "On Doing Things Voluntarily",
    url: "/essays/on-doing-things-voluntarily/"
  },
  {
    text: "Take a die. Put it on the table with the one facing up.<br>Did you do that voluntarily?<br>It seems so.<br>And did you voluntarily put the six face down?",
    source: "On Doing Things Voluntarily",
    url: "/essays/on-doing-things-voluntarily/"
  },
  {
    text: "Now think of soccer.<br>Could you consciously decide every movement while running?<br>Probably not.<br>Sometimes there is only time to play.<br>Yet you still notice.<br>A free teammate.<br>An opponent approaching.<br>A gap.<br>You decide.<br>And the game continues.",
    source: "On Doing Things Voluntarily",
    url: "/essays/on-doing-things-voluntarily/"
  },
  {
    text: "Look outside on a sunny day and see that the sky is blue. Now try to make yourself believe that the sky is red. <br>Again, you may attempt to decide that it is red. This does not work. The perception remains. The belief does not follow.",
    source: "On The Limits Of Deliberate Belief: An Illustration",
    url: "/essays/on-the-limits-of-deliberate-belief/"
  }
];

let quoteOrder = [];
let quoteIndex = 0;

function shuffleQuotes() {
    quoteOrder = quotes.map((_, i) => i);

    for (let i = quoteOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [quoteOrder[i], quoteOrder[j]] = [quoteOrder[j], quoteOrder[i]];
    }

    quoteIndex = 0;
}

function showRandomQuote() {
    if (quoteOrder.length === 0 || quoteIndex >= quoteOrder.length) {
        shuffleQuotes();
    }

    const q = quotes[quoteOrder[quoteIndex]];
    quoteIndex++;

    document.getElementById("homepage-quote").innerHTML = `
        <blockquote>
            <p>${q.text}</p>
        </blockquote>
        <footer>
            from <a href="${q.url}">${q.source}</a>
        </footer>
    `;
}

shuffleQuotes();
showRandomQuote();
</script>
<p><button
  onclick="showRandomQuote()"
  style="font-size: 0.8em; opacity: 0.7;">
(Click here for another quote.)
</button></p>
</section>
