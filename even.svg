<svg viewBox="0 0 120 120" width="220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Odd square has an unavoidable center">
  <style>
    :root{
      --dot: #c9c9c9;     /* normal dots */
      --axis: #3b82f6;    /* middle row/column */
      --center: #000000;  /* center dot */
    }
    .dot { fill: var(--dot); }
    .axis { fill: var(--axis); }
    .center { fill: var(--center); }
  </style>

  <!-- optional border -->
  <rect x="10" y="10" width="100" height="100" fill="none" stroke="currentColor" stroke-width="2" opacity="0.35"/>

  <!-- 5x5 dot grid, step = 20, starting at 20 -->
  <!-- row 1 -->
  <circle class="dot" cx="20" cy="20" r="3.6"/>
  <circle class="dot" cx="40" cy="20" r="3.6"/>
  <circle class="axis" cx="60" cy="20" r="3.6"/>
  <circle class="dot" cx="80" cy="20" r="3.6"/>
  <circle class="dot" cx="100" cy="20" r="3.6"/>

  <!-- row 2 -->
  <circle class="dot" cx="20" cy="40" r="3.6"/>
  <circle class="dot" cx="40" cy="40" r="3.6"/>
  <circle class="axis" cx="60" cy="40" r="3.6"/>
  <circle class="dot" cx="80" cy="40" r="3.6"/>
  <circle class="dot" cx="100" cy="40" r="3.6"/>

  <!-- row 3 (axis row) -->
  <circle class="axis" cx="20" cy="60" r="3.6"/>
  <circle class="axis" cx="40" cy="60" r="3.6"/>
  <circle class="center" cx="60" cy="60" r="4.2"/>
  <circle class="axis" cx="80" cy="60" r="3.6"/>
  <circle class="axis" cx="100" cy="60" r="3.6"/>

  <!-- row 4 -->
  <circle class="dot" cx="20" cy="80" r="3.6"/>
  <circle class="dot" cx="40" cy="80" r="3.6"/>
  <circle class="axis" cx="60" cy="80" r="3.6"/>
  <circle class="dot" cx="80" cy="80" r="3.6"/>
  <circle class="dot" cx="100" cy="80" r="3.6"/>

  <!-- row 5 -->
  <circle class="dot" cx="20" cy="100" r="3.6"/>
  <circle class="dot" cx="40" cy="100" r="3.6"/>
  <circle class="axis" cx="60" cy="100" r="3.6"/>
  <circle class="dot" cx="80" cy="100" r="3.6"/>
  <circle class="dot" cx="100" cy="100" r="3.6"/>

  <line x1="10" y1="70" x2="110" y2="70" stroke="#cc3333" stroke-width="3"/>
  <line x1="50" y1="70" x2="50" y2="50" stroke="#cc3333" stroke-width="3"/>
  <line x1="10" y1="50" x2="110" y2="50" stroke="#cc3333" stroke-width="3"/>
  <line x1="70" y1="70" x2="70" y2="50" stroke="#cc3333" stroke-width="3"/>
</svg>