<svg viewBox="0 0 980 820" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root{
      --bg:#fbfaf6;
      --text:#1a1a1a;
      --muted:#6a6a6a;
      --accent:#1f5fa3;   /* brighter blue */
      --border:#d8dde6;
    }

    .bg { fill: var(--bg); }
    .outer { stroke: var(--border); stroke-width: 1; fill: none; }
    .rowline { stroke: var(--border); stroke-width: 1; }
    .divider { stroke: var(--border); stroke-width: 1; }

    .label {
      font: 600 18px "Cormorant Garamond", serif;
      fill: var(--text);
    }
    .small {
      font: 400 13px Inter, sans-serif;
      fill: var(--muted);
    }
    .text {
      font: 500 14px Inter, sans-serif;
      fill: var(--text);
    }
    .text-accent {
      font: 500 13px Inter, sans-serif;
      fill: var(--accent);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .block {
      fill: var(--accent);
      opacity: 0.22;
      stroke: var(--accent);
      stroke-width: 1;
    }

    .wedge {
      fill: var(--accent);
      opacity: 0.16;
      stroke: var(--accent);
      stroke-width: 1;
    }

    .arrow {
      stroke: var(--accent);
      stroke-width: 2;
      fill: none;
      opacity: .7;
    }
  </style>
  

  <!-- Background -->
  <rect x="0" y="0" width="860" height="780" class="bg"/>

  <text x="430" y="22" class="label" text-anchor="middle">Questioning - A One-Page Field Manual</text>

  <!-- Overall frame -->
  <rect x="30" y="30" width="800" height="720" class="outer"/>

  <!-- Two-column divider -->
  <!-- Left label column width -->
  <line x1="290" y1="30" x2="290" y2="750" class="divider"/>

  <!-- Row boundaries -->
  <line x1="30" y1="180" x2="830" y2="180" class="rowline"/>
  <line x1="30" y1="310" x2="830" y2="310" class="rowline"/>
  <line x1="30" y1="460" x2="830" y2="460" class="rowline"/>
  <line x1="30" y1="600" x2="830" y2="600" class="rowline"/>

  <!-- ========== ROW 1: What to ask for ========== -->
  <text x="60" y="75" class="label">What to ask for:</text>

  <!-- Top blocks -->
  <rect x="340" y="40" width="200" height="62" rx="6" class="block"/>
  <rect x="580" y="40" width="200" height="62" rx="6" class="block"/>

  <text x="440" y="67" text-anchor="middle" class="text">Nouns + Names + </text>
  <text x="440" y="89" text-anchor="middle" class="text">Descriptions</text>

  <text x="680" y="77" text-anchor="middle" class="text">Verbs that connect them</text>

  <rect x="340" y="113" width="440" height="28" rx="6" class="block"/>
  <text x="560" y="133" text-anchor="middle" class="text">Qualifiers for nouns and verbs</text>

  <rect x="340" y="145" width="440" height="28" rx="6" class="block"/>
  <text x="560" y="165" text-anchor="middle" class="text">Time and place</text>

  <!-- ========== ROW 2: Phases of the investigation ========== -->
  <text x="60" y="230" class="label">Phases of the</text>
  <text x="60" y="248" class="label">investigation:</text>

  <!-- Phase blocks -->
  <rect x="340" y="215" width="130" height="46" rx="6" class="block"/>
  <rect x="495" y="215" width="130" height="46" rx="6" class="block"/>
  <rect x="650" y="215" width="130" height="46" rx="6" class="block"/>

  <text x="405" y="244" text-anchor="middle" class="text">Overview</text>
  <text x="560" y="244" text-anchor="middle" class="text">Details</text>
  <text x="715" y="244" text-anchor="middle" class="text">Loose ends</text>

  <!-- subtle direction arrow -->
  <path d="M 340 275 H 780" class="arrow"/>
  <path d="M 780 275 l -12 -7 v 14 z" fill="#2f4f6f"/>

  <!-- ========== ROW 3: Question types across phases ========== -->
  <text x="60" y="350" class="label">What questions to</text>
  <text x="60" y="368" class="label">use how often</text>
  <text x="60" y="386" class="label">during the phases:</text>

  <!-- Wh-questions wedge (wide early -> narrow late) -->
  <polygon points="340,330 780,370 340,370" class="wedge"/>
  <text x="380" y="360" class="text">Wh-questions</text>

  <!-- yes-no wedge (narrow early -> wide late) -->
  <polygon points="340,440 780,440 780,400" class="wedge"/>
  <text x="630" y="430" class="text">Yes-no-questions</text>

  <!-- ========== ROW 4: Tools with a person ========== -->
  <text x="60" y="510" class="label">When asking a</text>
  <text x="60" y="528" class="label">specific person, what</text>
  <text x="60" y="544" class="label">tools to use how often</text>
  <text x="60" y="562" class="label">during the phases:</text>

  <!-- Paraphrasing wedge -->
  <polygon points="340,480 780,520 340,520" class="wedge"/>
  <text x="360" y="512" class="text">Paraphrase and confirm</text>

  <!-- What else wedge -->
  <polygon points="340,545 780,585 340,585" class="wedge" opacity="0.10"/>
  <text x="360" y="578" class="text">What else?</text>

  <!-- ========== ROW 5: Tools only if needed ========== -->
  <text x="60" y="650" class="label">When asking a</text>
  <text x="60" y="668" class="label">specific person, what</text>
  <text x="60" y="686" class="label">tools to use how often</text>
  <text x="60" y="702" class="label">during the phases</text>
  <text x="60" y="720" class="label">(only if needed):</text>

  <!-- Reasonable-person line (thin, understated) -->
  <polygon points="340,660 780,620 780,660" class="wedge"/>
  <text x="550" y="655" class="text">How else could this be understood?</text>

  <!-- Emotion feedback block -->
  <rect x="340" y="680" width="440" height="28" rx="6" class="block"/>
  <text x="500" y="700" class="text">Feedback on emotions</text>


</svg>
